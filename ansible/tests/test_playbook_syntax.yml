---
# test_playbook_syntax.yml — Validates that site.yml is syntactically
# correct and structurally sound. Does NOT require a real target host.
#
# Usage:
#   ansible-playbook tests/test_playbook_syntax.yml -i tests/inventory.ini

- name: Validate site.yml structure
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    site_yml: "{{ playbook_dir }}/../site.yml"

  tasks:
    - name: Load site.yml
      set_fact:
        playbook_docs: "{{ lookup('file', site_yml) | from_yaml_all }}"

    - name: Filter empty documents
      set_fact:
        playbook_data: "{{ playbook_docs | reject('none') | list }}"

    - name: Verify playbook is a list
      assert:
        that: "playbook_data | type_debug == 'list'"
        fail_msg: "site.yml should parse as a YAML document list"

    - name: Verify playbook has at least one play
      assert:
        that: "playbook_data | length >= 1"
        fail_msg: "site.yml should have at least one play"

    - name: Extract first play
      set_fact:
        first_play: "{{ playbook_data[0][0] if playbook_data[0] is iterable and playbook_data[0] | type_debug != 'dict' else playbook_data[0] }}"

    - name: Verify play has correct name
      assert:
        that: "'Deploy PXE-in-a-Box' in first_play.name"
        fail_msg: "site.yml first play should be named 'Deploy PXE-in-a-Box'"

    - name: Verify play targets pxe hosts
      assert:
        that: "first_play.hosts == 'pxe'"
        fail_msg: "site.yml should target 'pxe' hosts"

    - name: Verify play uses become
      assert:
        that: "first_play.become | bool"
        fail_msg: "site.yml should use become: true"

    - name: Verify play loads vars files
      assert:
        that:
          - "'group_vars/all.yml' in first_play.vars_files"
          - "'group_vars/vault.yml' in first_play.vars_files"
        fail_msg: "site.yml should load both vars files"

    - name: Extract task names
      set_fact:
        task_names: "{{ first_play.tasks | map(attribute='name') | list }}"

    - name: Verify required tasks exist
      assert:
        that: "item in task_names"
        fail_msg: "site.yml should contain task: {{ item }}"
      loop:
        - "Install Docker"
        - "Ensure Docker is running"
        - "Create PXE directories"
        - "Copy config files"
        - "Render dnsmasq config"
        - "Run pxe-gen to generate matchbox configs"
        - "Pull Docker image"
        - "Start PXE container"

    - name: Verify Docker container uses host network mode
      assert:
        that: >
          first_play.tasks | selectattr('name', 'equalto', 'Start PXE container')
          | map(attribute='docker_container.network_mode')
          | first == 'host'
        fail_msg: "Container should use network_mode: host"

    - name: Verify container mounts config as read-only
      assert:
        that: >
          first_play.tasks | selectattr('name', 'equalto', 'Start PXE container')
          | map(attribute='docker_container.volumes')
          | first | select('match', '.*:/config:ro')
          | list | length == 1
        fail_msg: "Config volume should be mounted read-only"

    - name: Verify container mounts assets as read-write
      assert:
        that: >
          first_play.tasks | selectattr('name', 'equalto', 'Start PXE container')
          | map(attribute='docker_container.volumes')
          | first | select('match', '.*:/assets$')
          | list | length == 1
        fail_msg: "Assets volume should be mounted read-write"

    - name: Verify pxe-gen command references correct paths
      assert:
        that: >
          first_play.tasks | selectattr('name', 'equalto', 'Run pxe-gen to generate matchbox configs')
          | map(attribute='command')
          | first | regex_search('--machines')
        fail_msg: "pxe-gen command should reference --machines flag"

    - name: Verify directory structure creates groups and profiles
      assert:
        that:
          - "dir_task.loop is defined"
          - "dir_task.loop | length >= 6"
          - "'groups' in (dir_task.loop | map('regex_replace', '\\{\\{.*?\\}\\}', '') | join(' '))"
          - "'profiles' in (dir_task.loop | map('regex_replace', '\\{\\{.*?\\}\\}', '') | join(' '))"
          - "'rendered' in (dir_task.loop | map('regex_replace', '\\{\\{.*?\\}\\}', '') | join(' '))"
      vars:
        dir_task: "{{ first_play.tasks | selectattr('name', 'equalto', 'Create PXE directories') | first }}"
        fail_msg: "Directory structure should include groups, profiles, rendered"

    - name: Playbook structure validation passed
      debug:
        msg: "site.yml structure validated: {{ task_names | length }} tasks, all required tasks present"
