---
# Encrypted secrets for Talos cluster.
# Encrypt with: ansible-vault encrypt group_vars/vault.yml
#
# These secrets are NEVER generated by PXE-in-a-Box.
# Extract them from your existing cluster or generate with `talosctl gen secret`.

# Cluster CA certificate (base64 encoded PEM)
talos_ca_cert: "REPLACE_WITH_YOUR_CA_CERT_BASE64"

# Cluster CA private key (base64 encoded PEM)
# Only needed for bootstrap node config. Omit for join configs.
talos_ca_key: "REPLACE_WITH_YOUR_CA_KEY_BASE64"

# Trustd join token (durable, reusable across machines)
talos_join_token: "REPLACE_WITH_YOUR_JOIN_TOKEN"

# Etcd CA certificate (base64 encoded PEM)
talos_etcd_ca_cert: "REPLACE_WITH_YOUR_ETCD_CA_CERT_BASE64"

# Etcd CA private key (base64 encoded PEM)
# Only needed for bootstrap node config.
talos_etcd_ca_key: "REPLACE_WITH_YOUR_ETCD_CA_KEY_BASE64"
