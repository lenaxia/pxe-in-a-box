---
# Encrypted secrets for Talos cluster.
# Encrypt with: ansible-vault encrypt group_vars/vault.yml
#
# These secrets are NEVER generated by PXE-in-a-Box.
# Extract them from your existing cluster:
#   talhelper gensecret > talsecret.yaml
# or read from existing rendered machine configs.

# ── Machine-level secrets (shared across all nodes) ──────────────────
machine_token: "REPLACE_WITH_MACHINE_TOKEN"

# Machine CA (base64 PEM)
machine_ca_cert: "REPLACE_WITH_MACHINE_CA_CERT_BASE64"
# Machine CA private key — controlplane nodes only
machine_ca_key: "REPLACE_WITH_MACHINE_CA_KEY_BASE64"

# ── Cluster-level secrets (shared across all nodes) ──────────────────
cluster_id: "REPLACE_WITH_CLUSTER_ID"
cluster_secret: "REPLACE_WITH_CLUSTER_SECRET"
cluster_name: "REPLACE_WITH_CLUSTER_NAME"
cluster_endpoint: "REPLACE_WITH_CLUSTER_ENDPOINT_IP"
cluster_token: "REPLACE_WITH_CLUSTER_TOKEN"

# Secretbox encryption
secretbox_secret: "REPLACE_WITH_SECRETBOX_SECRET"

# Cluster CA (base64 PEM)
cluster_ca_cert: "REPLACE_WITH_CLUSTER_CA_CERT_BASE64"
# Cluster CA private key — controlplane nodes only
cluster_ca_key: "REPLACE_WITH_CLUSTER_CA_KEY_BASE64"

# ── Control-plane-only secrets (not needed for workers) ──────────────
# Aggregator CA
aggregator_ca_cert: "REPLACE_WITH_AGGREGATOR_CA_CERT_BASE64"
aggregator_ca_key: "REPLACE_WITH_AGGREGATOR_CA_KEY_BASE64"

# Service account RSA key
service_account_key: "REPLACE_WITH_SERVICE_ACCOUNT_KEY_BASE64"

# Etcd CA
etcd_ca_cert: "REPLACE_WITH_ETCD_CA_CERT_BASE64"
etcd_ca_key: "REPLACE_WITH_ETCD_CA_KEY_BASE64"
