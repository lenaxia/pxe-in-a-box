---
# Shared variables for PXE-in-a-Box deployment
# Edit these to match your environment.

# Docker image
pxe_image: ghcr.io/homelab/pxe-in-a-box:latest
pxe_container_name: pxe-in-a-box

# Host directories
pxe_config_dir: /opt/pxe/config
pxe_assets_dir: /opt/pxe/assets

# Matchbox HTTP endpoint (the PXE host's IP and port)
# This IP must be static (DHCP reservation on UDM Pro)
matchbox_addr: 192.168.2.103
matchbox_port: "8081"

# dnsmasq proxy DHCP range (must cover the network where PXE clients live)
dnsmasq_proxy_range: 192.168.0.1
dnsmasq_proxy_netmask: 255.255.0.0

# Boot menu settings
menu_timeout: 10
menu_default: talos

# Logging
log_level: info
