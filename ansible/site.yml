---
# PXE-in-a-Box deployment playbook
# Deploys the PXE container and generates all config files on the target host.
#
# Usage:
#   ansible-playbook site.yml -i inventory.ini --ask-vault-pass
#
# Prerequisites:
#   - Inventory.ini lists the PXE host
#   - group_vars/vault.yml contains Talos secrets (encrypted)
#   - machines.yaml, assets.yaml, menu.yaml are in files/config/

- name: Deploy PXE-in-a-Box
  hosts: pxe
  become: true
  vars_files:
    - group_vars/all.yml
    - group_vars/vault.yml

  tasks:
    - name: Install Docker
      package:
        name: docker.io
        state: present
      when: install_docker | default(true)

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Create PXE directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ pxe_config_dir }}"
        - "{{ pxe_assets_dir }}"
        - "{{ pxe_config_dir }}/groups"
        - "{{ pxe_config_dir }}/profiles"
        - "{{ pxe_config_dir }}/templates"
        - "{{ pxe_config_dir }}/static"
        - "{{ pxe_assets_dir }}/rendered"
        - "{{ pxe_assets_dir }}/static"

    - name: Copy config files
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "0644"
      loop:
        - { src: "config/machines.yaml", dest: "{{ pxe_config_dir }}/machines.yaml" }
        - { src: "config/assets.yaml", dest: "{{ pxe_config_dir }}/assets.yaml" }
        - { src: "config/menu.yaml", dest: "{{ pxe_config_dir }}/menu.yaml" }

    - name: Render dnsmasq config
      template:
        src: templates/dnsmasq.conf.j2
        dest: "{{ pxe_config_dir }}/dnsmasq.conf"
        mode: "0644"

    - name: Copy Talos config templates
      copy:
        src: "config/templates/"
        dest: "{{ pxe_config_dir }}/templates/"
        mode: "0644"

    - name: Copy singleton config files
      copy:
        src: "config/static/"
        dest: "{{ pxe_config_dir }}/static/"
        mode: "0644"
      when: lookup('fileglob', 'config/static/*.yaml', wantlist=True) | length > 0
      ignore_errors: true

    - name: Render Talos machine configs
      template:
        src: "config/templates/{{ item.template }}"
        dest: "{{ pxe_assets_dir }}/rendered/{{ item.hostname }}.yaml"
        mode: "0644"
      loop: "{{ rendered_machines }}"
      when: item.template is defined and item.template | length > 0
      vars:
        hostname: "{{ item.hostname }}"
        cluster_name: "{{ item.vars.cluster_name | default('') }}"
        cluster_endpoint: "{{ item.vars.cluster_endpoint | default('') }}"
        kubernetes_version: "{{ item.vars.kubernetes_version | default('') }}"
        node_ip: "{{ item.vars.node_ip | default('') }}"

    - name: Run pxe-gen to generate matchbox configs
      command: >
        {{ pxe_gen_binary | default('pxe-gen') }}
        --machines {{ pxe_config_dir }}/machines.yaml
        --assets {{ pxe_config_dir }}/assets.yaml
        --menu {{ pxe_config_dir }}/menu.yaml
        --addr {{ matchbox_addr }}
        --port {{ matchbox_port }}
        --output-dir {{ pxe_config_dir }}
      register: pxe_gen_result
      changed_when: true

    - name: Show pxe-gen output
      debug:
        var: pxe_gen_result.stdout_lines

    - name: Move generated boot.ipxe to assets dir
      copy:
        src: "{{ pxe_config_dir }}/assets/boot.ipxe"
        dest: "{{ pxe_assets_dir }}/boot.ipxe"
        remote_src: true
        mode: "0644"

    - name: Pull Docker image
      docker_image:
        name: "{{ pxe_image }}"
        source: pull

    - name: Stop existing container
      docker_container:
        name: "{{ pxe_container_name }}"
        state: absent
      ignore_errors: true

    - name: Start PXE container
      docker_container:
        name: "{{ pxe_container_name }}"
        image: "{{ pxe_image }}"
        network_mode: host
        restart_policy: unless-stopped
        volumes:
          - "{{ pxe_config_dir }}:/config:ro"
          - "{{ pxe_assets_dir }}:/assets"
        env:
          LOG_LEVEL: "{{ log_level | default('info') }}"
