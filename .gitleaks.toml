title = "PXE-in-a-Box gitleaks config"

[extend]
# Start with the default rules
useDefault = true

[[allowlists]]
description = "Allow Go template placeholders (variable references, not real values)"
paths = [
  '''templates/.*\.tmpl$''',
]
regexes = [
  '''\{\{.*\}\}''',
]

[[allowlists]]
description = "Allow placeholder values in example/template configs"
paths = [
  '''examples/secrets\.yaml$''',
  '''examples/machines\.yaml$''',
]
regexes = [
  '''REPLACE_WITH_.*''',
  '''\.\.\.''',  # Truncated placeholder values
]
