name: OS Asset Verification

# Verifies that download URLs for each supported OS are reachable and
# that profile/bootscript generation produces correct paths per OS type.
# Each OS runs as a separate job so failures are clearly attributed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily to catch upstream URL changes
    - cron: "0 6 * * *"

permissions:
  contents: read

concurrency:
  group: os-${{ github.ref }}-${{ matrix.os }}
  cancel-in-progress: true

jobs:
  verify-os:
    name: ${{ matrix.os-name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: talos-official
            os-name: "Talos (GitHub Release)"
            test-run: "TestOSURLs_TalosOfficial$"
          - os: talos-imagefactory
            os-name: "Talos (Image Factory)"
            test-run: "TestOSURLs_TalosImageFactory$"
          - os: talos-uki
            os-name: "Talos (UKI)"
            test-run: "TestOSURLs_TalosUKI$"
          - os: ubuntu
            os-name: "Ubuntu"
            test-run: "TestOSURLs_Ubuntu$"
          - os: debian
            os-name: "Debian"
            test-run: "TestOSURLs_Debian$"
          - os: arch
            os-name: "Arch Linux"
            test-run: "TestOSURLs_Arch$"

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify ${{ matrix.os-name }} URLs
        run: go test -tags=integration -v ./internal/e2e/... -run '${{ matrix.test-run }}' -timeout 60s

      - name: Verify ${{ matrix.os-name }} profile generation
        if: matrix.os == 'talos-official'
        run: go test -tags=integration -v ./internal/e2e/... -run 'TestOSProfiles_AllOSTypes' -timeout 30s

      - name: Verify ${{ matrix.os-name }} bootscript generation
        if: matrix.os == 'talos-official'
        run: go test -tags=integration -v ./internal/e2e/... -run 'TestOSBootscript_AllOSTypes' -timeout 30s

  # Summary job for branch protection
  os-summary:
    name: OS Verification Summary
    runs-on: ubuntu-latest
    needs: verify-os
    if: always()
    steps:
      - name: Check all OS jobs
        run: |
          echo "Matrix results:"
          echo '${{ toJson(needs) }}' | jq -r '.verify-os.result'
          if [ "${{ needs.verify-os.result }}" != "success" ]; then
            echo "::error::One or more OS verification jobs failed"
            exit 1
          fi
          echo "All OS verification jobs passed"
