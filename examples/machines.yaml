# Example machine definitions for PXE-in-a-Box
# Copy to ansible/files/config/machines.yaml and edit for your environment.

groups:
  - name: controlplane
    profile: talos-v1.10.6
    template: controlplane.yaml.j2
    vars:
      install_disk: /dev/nvme0n1
      # Get your installer image (with schematic) from factory.talos.dev
      installer_image: factory.talos.dev/metal-installer/REPLACE_WITH_YOUR_SCHEMATIC:v1.12.4
    machines:
      - mac: aa:bb:cc:dd:00:01
        hostname: cp-00
        vars:
          node_ip: 192.168.1.10
      - mac: aa:bb:cc:dd:00:02
        hostname: cp-01
        vars:
          node_ip: 192.168.1.11
      - mac: aa:bb:cc:dd:00:03
        hostname: cp-02
        vars:
          node_ip: 192.168.1.12

  - name: workers
    profile: talos-v1.10.6
    template: worker.yaml.j2
    vars:
      installer_image: factory.talos.dev/metal-installer/REPLACE_WITH_YOUR_SCHEMATIC:v1.12.4
    machines:
      - mac: aa:bb:cc:dd:00:10
        hostname: worker-00
        vars:
          node_ip: 192.168.1.20
          install_disk_selector: naa.REPLACE_WITH_DISK_WWID
      - mac: aa:bb:cc:dd:00:11
        hostname: worker-01
        vars:
          node_ip: 192.168.1.21
          install_disk_selector: naa.REPLACE_WITH_DISK_WWID
      - mac: aa:bb:cc:dd:00:12
        hostname: worker-02
        vars:
          node_ip: 192.168.1.22
          install_disk_selector: naa.REPLACE_WITH_DISK_WWID

# Machines too unique to template (different GPU schematics, storage layouts)
# serve their own pre-rendered config files from static/
singletons:
  - mac: aa:bb:cc:dd:00:20
    hostname: worker-special
    profile: talos-v1.10.6
    config: worker-special.yaml
