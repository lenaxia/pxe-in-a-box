# dnsmasq configuration for PXE-in-a-Box
# Copy to config/dnsmasq.conf and edit for your network.
#
# This runs in PROXY DHCP mode — it does NOT assign IP addresses.
# Your router/DHCP server handles IP assignment. dnsmasq only adds
# PXE boot information to DHCP responses.
#
# Required edits:
#   - dhcp-range: change to match your network subnet
#   - YOUR_PXE_IP: change to the static IP of this PXE host

# ── Proxy DHCP ──────────────────────────────────────────────────────
# Format: dhcp-range=<any-ip>,proxy,<netmask>
# The IP is ignored in proxy mode — only the subnet/netmask matters.
# It must cover the subnet where PXE clients live.
dhcp-range=192.168.1.1,proxy,255.255.255.0

# ── Disable DNS ─────────────────────────────────────────────────────
# Your router handles DNS. dnsmasq only does DHCP proxy + TFTP.
port=0

# ── TFTP ────────────────────────────────────────────────────────────
enable-tftp
tftp-root=/tftpboot

# ── iPXE detection ──────────────────────────────────────────────────
# When iPXE loads via TFTP, it re-DHCPs with user-class "iPXE".
# This tag lets dnsmasq distinguish stage 1 (needs TFTP) from
# stage 2 (needs HTTP URL).
dhcp-userclass=set:ipxe,iPXE

# ── Stage 1: Raw PXE clients get iPXE binary via TFTP ───────────────
# tag:#ipxe = NOT tagged as ipxe (raw PXE client, first boot)
# x86PC = BIOS clients, x86-64_EFI = UEFI clients
pxe-service=tag:#ipxe,x86PC,"PXE chainload to iPXE",undionly.kpxe
pxe-service=tag:#ipxe,x86-64_EFI,"PXE chainload to iPXE",ipxe.efi

# ── Stage 2: iPXE clients get HTTP boot script ──────────────────────
# tag:ipxe = tagged as ipxe (iPXE already loaded)
# Both BIOS and UEFI get the same URL
pxe-service=tag:ipxe,x86PC,"iPXE",http://YOUR_PXE_IP:8081/assets/boot.ipxe
pxe-service=tag:ipxe,x86-64_EFI,"iPXE",http://YOUR_PXE_IP:8081/assets/boot.ipxe

# ── Logging ─────────────────────────────────────────────────────────
log-queries
log-dhcp
